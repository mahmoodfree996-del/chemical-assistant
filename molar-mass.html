<body>

    <nav>
        <div class="logo">Chemical Assistant</div>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="molar-mass.html">Molar Mass</a>
        </div>
    </nav>

    <div class="calc-wrapper">
        <div class="container">
            <h1>Molar Mass Calculator</h1>
            <p class="subtitle">Enter a chemical formula to get its molecular weight</p>
            
            <input type="text" id="formula" placeholder="Example: H2SO4">
            <button onclick="calculate()">Calculate</button>

            <div class="result" id="result">
                <p style="color: #64748b; text-align: center;">Result will appear here</p>
            </div>
        </div>
    </div>

    <footer>
        © 2026 Chemical Assistant - All Rights Reserved
    </footer>

    <script>
        const elements = [
            { symbol: "H", molarMass: 1.0080 }, { symbol: "He", molarMass: 4.00260 },
            { symbol: "Li", molarMass: 7.0 }, { symbol: "Be", molarMass: 9.012183 },
            { symbol: "B", molarMass: 10.81 }, { symbol: "C", molarMass: 12.011 },
            { symbol: "N", molarMass: 14.007 }, { symbol: "O", molarMass: 15.999 },
            { symbol: "F", molarMass: 18.99840316 }, { symbol: "Ne", molarMass: 20.180 },
            { symbol: "Na", molarMass: 22.9897693 }, { symbol: "Mg", molarMass: 24.305 },
            { symbol: "Al", molarMass: 26.981538 }, { symbol: "Si", molarMass: 28.085 },
            { symbol: "P", molarMass: 30.97376200 }, { symbol: "S", molarMass: 32.07 },
            { symbol: "Cl", molarMass: 35.45 }, { symbol: "Ar", molarMass: 39.9 },
            { symbol: "K", molarMass: 39.0983 }, { symbol: "Ca", molarMass: 40.08 },
            { symbol: "Sc", molarMass: 44.95591 }, { symbol: "Ti", molarMass: 47.867 },
            { symbol: "V", molarMass: 50.9415 }, { symbol: "Cr", molarMass: 51.996 },
            { symbol: "Mn", molarMass: 54.93804 }, { symbol: "Fe", molarMass: 55.84 },
            { symbol: "Co", molarMass: 58.93319 }, { symbol: "Ni", molarMass: 58.693 },
            { symbol: "Cu", molarMass: 63.55 }, { symbol: "Zn", molarMass: 65.4 },
            { symbol: "Ga", molarMass: 69.723 }, { symbol: "Ge", molarMass: 72.63 },
            { symbol: "As", molarMass: 74.92159 }, { symbol: "Se", molarMass: 78.97 },
            { symbol: "Br", molarMass: 79.90 }, { symbol: "Kr", molarMass: 83.80 },
            { symbol: "Rb", molarMass: 85.468 }, { symbol: "Sr", molarMass: 87.62 },
            { symbol: "Y", molarMass: 88.90584 }, { symbol: "Zr", molarMass: 91.22 },
            { symbol: "Nb", molarMass: 92.90637 }, { symbol: "Mo", molarMass: 95.95 },
            { symbol: "Tc", molarMass: 96.90636 }, { symbol: "Ru", molarMass: 101.1 },
            { symbol: "Rh", molarMass: 102.9055 }, { symbol: "Pd", molarMass: 106.42 },
            { symbol: "Ag", molarMass: 107.868 }, { symbol: "Cd", molarMass: 112.41 },
            { symbol: "In", molarMass: 114.818 }, { symbol: "Sn", molarMass: 118.71 },
            { symbol: "Sb", molarMass: 121.760 }, { symbol: "Te", molarMass: 127.6 },
            { symbol: "I", molarMass: 126.9045 }, { symbol: "Xe", molarMass: 131.29 },
            { symbol: "Cs", molarMass: 132.9054520 }, { symbol: "Ba", molarMass: 137.33 },
            { symbol: "La", molarMass: 138.9055 }, { symbol: "Ce", molarMass: 140.116 },
            { symbol: "Pr", molarMass: 140.90766 }, { symbol: "Nd", molarMass: 144.24 },
            { symbol: "Pm", molarMass: 144.91276 }, { symbol: "Sm", molarMass: 150.4 },
            { symbol: "Eu", molarMass: 151.964 }, { symbol: "Gd", molarMass: 157.25 },
            { symbol: "Tb", molarMass: 158.92535 }, { symbol: "Dy", molarMass: 162.500 },
            { symbol: "Ho", molarMass: 164.93033 }, { symbol: "Er", molarMass: 167.26 },
            { symbol: "Tm", molarMass: 168.93422 }, { symbol: "Yb", molarMass: 173.05 },
            { symbol: "Lu", molarMass: 174.9667 }, { symbol: "Hf", molarMass: 178.49 },
            { symbol: "Ta", molarMass: 180.9479 }, { symbol: "W", molarMass: 183.84 },
            { symbol: "Re", molarMass: 186.207 }, { symbol: "Os", molarMass: 190.2 },
            { symbol: "Ir", molarMass: 192.22 }, { symbol: "Pt", molarMass: 195.08 },
            { symbol: "Au", molarMass: 196.96657 }, { symbol: "Hg", molarMass: 200.59 },
            { symbol: "Tl", molarMass: 204.383 }, { symbol: "Pb", molarMass: 207 },
            { symbol: "Bi", molarMass: 208.98040 }, { symbol: "Po", molarMass: 208.98243 },
            { symbol: "At", molarMass: 209.98715 }, { symbol: "Rn", molarMass: 222.01758 },
            { symbol: "Fr", molarMass: 223.01973 }, { symbol: "Ra", molarMass: 226.02541 },
            { symbol: "Ac", molarMass: 227.02775 }, { symbol: "Th", molarMass: 232.038 },
            { symbol: "Pa", molarMass: 231.03588 }, { symbol: "U", molarMass: 238.0289 },
            { symbol: "Np", molarMass: 237.048172 }, { symbol: "Pu", molarMass: 244.06420 },
            { symbol: "Am", molarMass: 243.061380 }, { symbol: "Cm", molarMass: 247.07035 },
            { symbol: "Bk", molarMass: 247.07031 }, { symbol: "Cf", molarMass: 251.07959 },
            { symbol: "Es", molarMass: 252.0830 }, { symbol: "Fm", molarMass: 257.09511 },
            { symbol: "Md", molarMass: 258.09843 }, { symbol: "No", molarMass: 259.10100 },
            { symbol: "Lr", molarMass: 266.120 }, { symbol: "Rf", molarMass: 267.122 },
            { symbol: "Db", molarMass: 268.126 }, { symbol: "Sg", molarMass: 269.128 },
            { symbol: "Bh", molarMass: 270.133 }, { symbol: "Hs", molarMass: 269.1336 },
            { symbol: "Mt", molarMass: 277.154 }, { symbol: "Ds", molarMass: 282.166 },
            { symbol: "Rg", molarMass: 282.169 }, { symbol: "Cn", molarMass: 286.179 },
            { symbol: "Nh", molarMass: 286.182 }, { symbol: "Fl", molarMass: 290.192 },
            { symbol: "Mc", molarMass: 290.196 }, { symbol: "Lv", molarMass: 293.205 },
            { symbol: "Ts", molarMass: 294.211 }, { symbol: "Og", molarMass: 295.216 }
        ];

        const atomicMass = {};
        elements.forEach(el => {
            atomicMass[el.symbol] = el.molarMass;
        });

        function calculate() {
            let formula = document.getElementById("formula").value.trim();
            if(!formula) {
                document.getElementById("result").innerHTML = `<p style="color: #64748b; text-align: center;">Please enter a formula.</p>`;
                return;
            }

            let regex = /([A-Z][a-z]?)(\d*)/g;
            let match;
            let total = 0;
            let details = "";

            while ((match = regex.exec(formula)) !== null) {
                let element = match[1];
                let count = parseInt(match[2]) || 1;

                if (atomicMass[element]) {
                    let mass = atomicMass[element] * count;
                    total += mass;
                    details += `<div><strong>${element}</strong> × ${count} = ${mass.toFixed(4)} g/mol</div>`;
                } else {
                    details += `<div class="unknown-el">Unknown element: <strong>${element}</strong></div>`;
                }
            }

            document.getElementById("result").innerHTML = `
                <h3>Total Molar Mass</h3>
                <p class="total">${total.toFixed(4)} g/mol</p>
                <hr>
                <div class="breakdown">
                    ${details}
                </div>
            `;
        }
    </script>
