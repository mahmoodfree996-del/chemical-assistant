<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Molar Mass Calculator</title>

<style>

body{
    font-family: Arial, sans-serif;
    background:#0f172a;
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    margin:0;
}

.container{
    background:#1e293b;
    padding:25px;
    border-radius:15px;
    width:350px;
    box-shadow:0 0 15px rgba(0,0,0,0.4);
}

h1{
    text-align:center;
    margin-bottom:20px;
}

input{
    width:100%;
    padding:12px;
    border:none;
    border-radius:10px;
    margin-bottom:15px;
    font-size:18px;
    box-sizing:border-box;
}

button{
    width:100%;
    padding:12px;
    border:none;
    border-radius:10px;
    background:#38bdf8;
    color:white;
    font-size:18px;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    background:#0ea5e9;
}

.result{
    margin-top:20px;
    background:#334155;
    padding:15px;
    border-radius:10px;
    line-height:1.8;
}

hr{
    border:none;
    height:1px;
    background:#475569;
    margin:15px 0;
}

</style>

</head>
<body>

<div class="container">

<h1>Molar Mass Calculator</h1>

<input type="text" id="formula" placeholder="Example: H2SO4">

<button onclick="calculate()">Calculate</button>

<div class="result" id="result">
Result will appear here
</div>

</div>

<script>

const atomicMass = {
    H:1.008,
    He:4.0026,
    Li:6.94,
    Be:9.0122,
    B:10.81,
    C:12.01,
    N:14.01,
    O:16.00,
    F:19.00,
    Na:22.99,
    Mg:24.31,
    Al:26.98,
    Si:28.09,
    P:30.97,
    S:32.06,
    Cl:35.45,
    K:39.10,
    Ca:40.08,
    Fe:55.85,
    Cu:63.55,
    Zn:65.38
};

function calculate(){

    let formula = document.getElementById("formula").value.trim();

    let regex = /([A-Z][a-z]?)(\d*)/g;

    let match;

    let total = 0;

    let details = "";

    while((match = regex.exec(formula)) !== null){

        let element = match[1];

        let count = parseInt(match[2]) || 1;

        if(atomicMass[element]){

            let mass = atomicMass[element] * count;

            total += mass;

            details += `
            ${element} × ${count} = ${mass.toFixed(2)} g/mol <br>
            `;
        }
        else{

            details += `
            Unknown element: ${element}<br>
            `;
        }
    }

    document.getElementById("result").innerHTML = `
        <h3>Total Molar Mass</h3>
        <p>${total.toFixed(2)} g/mol</p>
        <hr>
        ${details}
    `;
}

</script>

</body>
</html>
