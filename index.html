    { symbol: "Og", molarMass: 295.216 }
];

const atomicMass = {};

elements.forEach(el => {
    atomicMass[el.symbol] = el.molarMass;
});

function calculate() {

    let formula = document.getElementById("formula").value.trim();

    let regex = /([A-Z][a-z]?)(\d*)/g;

    let match;

    let total = 0;

    let details = "";

    while ((match = regex.exec(formula)) !== null) {

        let element = match[1];

        let count = parseInt(match[2]) || 1;

        if (atomicMass[element]) {

            let mass = atomicMass[element] * count;

            total += mass;

            details += `
                ${element} × ${count} = ${mass.toFixed(2)} g/mol <br>
            `;
        }

        else {

            details += `
                Unknown element: ${element}<br>
            `;
        }
    }

    document.getElementById("result").innerHTML = `
        <h3>Total Molar Mass</h3>
        <p>${total.toFixed(2)} g/mol</p>
        <hr>
        ${details}
    `;
}
